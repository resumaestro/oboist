name: Provision and Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  read-tokens:
    name: Read tokens.yml
    runs-on: ubuntu-latest
    outputs:
      secret_keys: ${{ steps.read.outputs.secret_keys }}
      variable_keys: ${{ steps.read.outputs.variable_keys }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        uses: resumaestro/pit-boss/actions/tokens/read@main

  provision-staging:
    name: Provision (staging)
    runs-on: ubuntu-latest
    concurrency:
      group: provision-STAGING
      cancel-in-progress: false
    outputs:
      passed: ${{ steps.provision.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Provision staging
        id: provision
        uses: resumaestro/pit-boss/actions/provision/database@main
        with:
          target: STAGING
          provision_dir: provision/pipeline
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  provision-production:
    name: Provision (production)
    needs: provision-staging
    runs-on: ubuntu-latest
    concurrency:
      group: provision-PRODUCTION
      cancel-in-progress: false
    outputs:
      passed: ${{ steps.provision.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Provision production
        id: provision
        uses: resumaestro/pit-boss/actions/provision/database@main
        with:
          target: PRODUCTION
          provision_dir: provision/pipeline
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  rollback-apply:
    name: Rollback apply (KV)
    needs: [apply, secrets-sync, deploy]
    if: |
      always() &&
      needs.apply.result == 'success' &&
      (needs.secrets-sync.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rollback apply
        uses: resumaestro/pit-boss/actions/provision/apply-rollback@main
        with:
          target: RESUMAESTRO_CONFIG
          version: ${{ needs.apply.outputs.apply_version }}
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  rollback-database-staging:
    name: Rollback database (staging)
    needs: [provision-staging, apply, secrets-sync, deploy]
    if: |
      always() &&
      needs.provision-staging.result == 'success' &&
      (needs.apply.result == 'failure' || needs.secrets-sync.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read rollback target
        id: read-target
        shell: bash
        run: |
          CONFIG="provision/pipeline/config.yml"
          if [[ ! -f "$CONFIG" ]]; then
            echo "No config.yml found; skipping rollback."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(yq -r '.operation_versions.migration // 0' "$CONFIG")
          PREV=$(( VERSION - 1 ))
          echo "target_migration=$PREV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Rollback staging
        if: steps.read-target.outputs.skip != 'true'
        uses: resumaestro/pit-boss/actions/provision/database-rollback@main
        with:
          target: STAGING
          provision_dir: provision/pipeline
          target_migration: ${{ steps.read-target.outputs.target_migration }}
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  rollback-database-production:
    name: Rollback database (production)
    needs: [provision-production, apply, secrets-sync, deploy]
    if: |
      always() &&
      needs.provision-production.result == 'success' &&
      (needs.apply.result == 'failure' || needs.secrets-sync.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read rollback target
        id: read-target
        shell: bash
        run: |
          CONFIG="provision/pipeline/config.yml"
          if [[ ! -f "$CONFIG" ]]; then
            echo "No config.yml found; skipping rollback."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(yq -r '.operation_versions.migration // 0' "$CONFIG")
          PREV=$(( VERSION - 1 ))
          echo "target_migration=$PREV" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Rollback production
        if: steps.read-target.outputs.skip != 'true'
        uses: resumaestro/pit-boss/actions/provision/database-rollback@main
        with:
          target: PRODUCTION
          provision_dir: provision/pipeline
          target_migration: ${{ steps.read-target.outputs.target_migration }}
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  open-revert-pr:
    name: Open revert PR
    needs: [provision-staging, provision-production, apply, secrets-sync, deploy, rollback-apply, rollback-database-staging, rollback-database-production]
    if: |
      always() &&
      failure() &&
      (needs.provision-staging.result == 'failure' || needs.provision-production.result == 'failure' || needs.apply.result == 'failure' || needs.secrets-sync.result == 'failure' || needs.deploy.result == 'failure' || needs.rollback-apply.result == 'failure' || needs.rollback-database-staging.result == 'failure' || needs.rollback-database-production.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Open revert PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          BRANCH="revert/provision-${{ github.sha }}"
          BRANCH="${BRANCH:0:50}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          PARENT_COUNT=$(git cat-file -p "${{ github.sha }}" | grep -c '^parent ')
          if [[ "$PARENT_COUNT" -gt 1 ]]; then
            git revert --no-edit -m 1 "${{ github.sha }}"
          else
            git revert --no-edit "${{ github.sha }}"
          fi

          if ! git push origin "$BRANCH" 2>&1; then
            echo "::warning::Failed to push revert branch $BRANCH — it may already exist."
            exit 0
          fi

          if gh pr view --repo resumaestro/oboist "$BRANCH" &>/dev/null; then
            echo "::warning::Revert PR for $BRANCH already exists, skipping."
            exit 0
          fi

          gh pr create \
            --repo resumaestro/oboist \
            --title "Revert: deploy failed (${{ github.sha }})" \
            --body "$(cat <<'EOF'
          ## Automated revert

          Deploy failed on commit ${{ github.sha }}.

          **To fix:** correct the issue and re-merge.

          See the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          EOF
          )" \
            --base main \
            --head "$BRANCH" || echo "::warning::gh pr create failed — PR may already exist."

  apply:
    name: Apply
    needs: provision-production
    runs-on: ubuntu-latest
    outputs:
      apply_version: ${{ steps.apply.outputs.apply_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Apply
        id: apply
        uses: resumaestro/pit-boss/actions/provision/apply@main
        with:
          provision_dir: provision/kv
          target: RESUMAESTRO_CONFIG
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  secrets-sync:
    name: Sync secrets
    needs: [read-tokens, apply]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: resumaestro/pit-boss/actions/secrets/sync@main
        with:
          worker: resumaestro-oboist
          secret_keys: ${{ needs.read-tokens.outputs.secret_keys }}
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  deploy:
    name: Deploy
    needs: [read-tokens, secrets-sync]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - uses: resumaestro/pit-boss/actions/deploy@main
        with:
          variable_keys: ${{ needs.read-tokens.outputs.variable_keys }}
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}
          cloudflare_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
