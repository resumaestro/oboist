name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  read-tokens:
    name: Read tokens.yml
    runs-on: ubuntu-latest
    outputs:
      secrets: ${{ steps.read.outputs.secrets }}
      variables: ${{ steps.read.outputs.variables }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        uses: resumaestro/pit-boss/actions/read-tokens@main

  push-secrets:
    name: Push secrets
    needs: read-tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - uses: resumaestro/pit-boss/actions/push-secrets@main
        with:
          secrets: ${{ needs.read-tokens.outputs.secrets }}
          config: wrangler.toml
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}

  deploy:
    name: Deploy with vars
    needs: [read-tokens, push-secrets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - uses: resumaestro/pit-boss/actions/deploy-vars@main
        with:
          variables: ${{ needs.read-tokens.outputs.variables }}
          config: wrangler.toml
          proxy_url: ${{ vars.OBOIST_URL }}
          proxy_token: ${{ secrets.OBOIST_SECRET }}
